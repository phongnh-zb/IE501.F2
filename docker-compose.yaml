services:

  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ie501-dropout-webapp:latest
    container_name: ie501-webapp

    ports:
      - "5001:5001"

    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-key-change-before-production}
      HBASE_HOST: ${HBASE_HOST:-host.docker.internal}
      HADOOP_HOST: ${HADOOP_HOST:-host.docker.internal}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # ── Persistent runtime data (always mounted) ──────────────────────────
      # users.db survives container restarts and image rebuilds.
      - ./data/auth:/app/data/auth

      # ── Development-only mounts (comment out for production) ─────────────
      # Flask reads templates and static files from disk on every request.
      # Changes to .html, .css, and .js are visible on the next browser refresh.
      #
      # Python files (routes/, auth/, services/) are NOT live-reloaded —
      # they are loaded once at startup from the image. Any change to .py
      # files requires a full image rebuild: docker compose up --build
      #
      # Remove these three lines before deploying to production.
      - ./webapp/templates:/app/webapp/templates
      - ./webapp/static:/app/webapp/static
      - ./configs:/app/configs

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s