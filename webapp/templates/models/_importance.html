<div class="card">
  <div class="card-head">
    <h3><i class="fas fa-arrow-up-right-dots"></i> Feature importance</h3>
    <div class="models-imp-tabs" id="imp-tabs">
      {% for m in models %} {% if m.importance %}
      <button
        class="models-imp-tab {% if m.is_best %}active{% endif %}"
        data-model="{{ m.name }}"
        onclick="Models.showImportance('{{ m.name }}')"
      >
        {{ m.name }}
      </button>
      {% endif %} {% endfor %}
    </div>
  </div>
  <div class="card-body">
    <div class="chart-wrap" style="height: 320px">
      <div id="chart-importance" style="height: 100%"></div>
    </div>
    <p class="models-imp-note text-xs text-3">
      Scores normalised to sum to 1. Tree models use Gini gain; LR and SVM use
      absolute coefficient magnitude.
    </p>
  </div>
</div>
