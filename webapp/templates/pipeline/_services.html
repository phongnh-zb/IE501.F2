<div class="card pipe-card">
  <div class="card-head">
    <h3><i class="fas fa-server"></i> Services</h3>
    <span class="text-xs text-3" id="svc-updated">—</span>
  </div>
  <div id="services-list" class="pipe-services">
    {% for group, label, count in [('Hadoop','Hadoop HDFS + YARN',3), ('HBase','HBase +
    Thrift',2), ('App','Web Application',1)] %}
    <div class="pipe-service-group">
      <div class="pipe-group-label">{{ label }}</div>
      <div class="pipe-group-items" id="group-{{ group }}">
        {% for i in range(count) %}
		  <div class="pipe-skeleton"></div>
		{% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
