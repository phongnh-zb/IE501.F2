<div class="card pipe-card">
	<div class="card-head">
	  <h3><i class="fas fa-database"></i> Data inventory</h3>
	</div>
	<div class="pipe-data">
  
	  <div class="pipe-data-group">
		<div class="pipe-group-label">HDFS</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Raw data</span>
		  <span class="pipe-field-value" id="hdfs-raw">—</span>
		</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Processed</span>
		  <span class="pipe-field-value" id="hdfs-proc">—</span>
		</div>
	  </div>
  
	  <div class="pipe-data-group">
		<div class="pipe-group-label">HBase</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Predictions</span>
		  <span class="pipe-field-value mono" id="hbase-predictions">—</span>
		</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Model results</span>
		  <span class="pipe-field-value mono" id="hbase-models">—</span>
		</div>
	  </div>
  
	  <div class="pipe-data-group">
		<div class="pipe-group-label">Cache</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Status</span>
		  <span class="pipe-field-value" id="cache-status">—</span>
		</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Students loaded</span>
		  <span class="pipe-field-value mono" id="cache-count">—</span>
		</div>
		<div class="pipe-field-row">
		  <span class="pipe-field-label">Last synced</span>
		  <span class="pipe-field-value mono text-sm" id="cache-updated">—</span>
		</div>
	  </div>
  
	</div>
  </div>
