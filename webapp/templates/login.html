<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Dropout Prediction</title>
  <<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
</head>
<body class="login-body">

  <div class="login-wrap">

    <div class="login-brand">
      <span class="login-brand-mark"><i class="fas fa-graduation-cap"></i></span>
      <span class="login-brand-name">Dropout Prediction</span>
    </div>

    <div class="login-card">

      <div class="login-card-head">
        <h1 class="login-title">Sign in</h1>
        <p class="login-sub">Use your institutional credentials</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="login-alert login-alert-{{ category }}">
            <i class="fas fa-circle-exclamation"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" class="login-form" autocomplete="off">

        <div class="login-field">
          <label for="username">Username</label>
          <div class="login-input-wrap">
            <i class="fas fa-user login-input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              required
              autofocus
              autocomplete="username"
            />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <div class="login-input-wrap">
            <i class="fas fa-lock login-input-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <button type="submit" class="login-btn">
          Sign in
        </button>

      </form>

    </div>

    <p class="login-footer">&copy; 2026 Student Dropout Prediction System</p>

  </div>

</body>
</html>
