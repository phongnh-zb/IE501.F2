<div class="card st-table-card">
  <div class="st-table-wrap">
    <table class="st-table" id="st-table">
      <thead>
        <tr>
          <th class="text-left" onclick="Students.sort('id')" data-field="id">
            Student ID <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('code_module')"
            data-field="code_module"
          >
            Module <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('risk')"
            data-field="risk"
          >
            Risk <i class="fas fa-sort-down"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('score')"
            data-field="score"
          >
            Score <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('submission_rate')"
            data-field="submission_rate"
          >
            Submission <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('engagement_ratio')"
            data-field="engagement_ratio"
          >
            Engagement <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('active_days')"
            data-field="active_days"
          >
            Active days <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('clicks')"
            data-field="clicks"
          >
            Clicks <i class="fas fa-sort st-sort-idle"></i>
          </th>
          <th
            class="text-center"
            onclick="Students.sort('withdrew_early')"
            data-field="withdrew_early"
          >
            Status <i class="fas fa-sort st-sort-idle"></i>
          </th>
        </tr>
      </thead>
      <tbody id="st-tbody">
        <tr>
          <td colspan="9" class="text-center st-loading-cell">
            <i class="fas fa-spinner fa-spin"></i> Loading…
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div id="st-pagination" class="st-pagination"></div>
</div>
