{% extends 'base.html' %}
{% set active_page = '' %}
{% block title %}Loading{% endblock %}

{% block content %}
<div class="loading-wrap">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <h2 style="font-size:1.0625rem;margin-bottom:.5rem;">Synchronising data</h2>
    <p class="text-2 text-sm">Connecting to HBase and loading student predictions.<br>This takes a moment on first start.</p>
    <p class="text-3 text-xs mt-4">Page reloads automatically in 5 seconds.</p>
  </div>
</div>
<meta http-equiv="refresh" content="5; url={{ request.path }}" />
{% endblock %}
