<div class="card dash-row" style="gap: 0">
  <div class="card-head">
    <h3><i class="fas fa-triangle-exclamation"></i> Requires attention</h3>
    <span class="text-xs text-3">Sorted by severity</span>
  </div>
  <div id="attention-list" class="attention-list">
    <div id="attention-list-loading" class="chart-loading">
      <i class="fas fa-spinner fa-spin"></i> Loading…
    </div>
  </div>
</div>

<div class="dash-row dash-charts-row">
  <div class="card">
    <div class="card-head">
      <h3><i class="fas fa-layer-group"></i> Risk by module</h3>
      <span class="text-xs text-3">Critical + High · by presentation</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap" id="module-chart-wrap" style="height: 260px">
        <div id="chart-module-loading" class="chart-loading">
          <i class="fas fa-spinner fa-spin"></i> Loading…
        </div>
        <div id="chart-module" style="height: 100%"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <h3><i class="fas fa-users"></i> Risk by age band</h3>
      <span class="text-xs text-3">All tiers</span>
    </div>
    <div class="card-body">
      <div class="chart-wrap" style="height: 260px">
        <div id="chart-ageband-loading" class="chart-loading">
          <i class="fas fa-spinner fa-spin"></i> Loading…
        </div>
        <div id="chart-ageband" style="height: 100%"></div>
      </div>
    </div>
  </div>
</div>
