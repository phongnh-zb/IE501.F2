<div class="dash-hero">
  <div class="dash-hero-top">
    <div>
      <h1 class="dash-hero-title">Overview</h1>
      <p class="dash-hero-sub">Real-time dropout risk across all enrollments</p>
    </div>
    <div class="dash-hero-actions">
      <span class="dash-updated" id="last-updated">—</span>
      <button
        class="btn btn-ghost btn-sm"
        id="refresh-btn"
        onclick="Dashboard.refresh()"
      >
        <i class="fas fa-rotate-right"></i> Refresh
      </button>
    </div>
  </div>
  <div class="stat-strip">
    <div class="stat-block">
      <span class="stat-label">Total students</span>
      <span class="stat-num mono" id="stat-total">—</span>
      <span class="stat-note">across all enrollments</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Safe</span>
      <span class="stat-num mono" id="stat-safe" style="color: var(--safe)"
        >—</span
      >
      <span class="stat-note">no action needed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Watch</span>
      <span class="stat-num mono" id="stat-watch" style="color: var(--watch)"
        >—</span
      >
      <span class="stat-note">early warning signals</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">High risk</span>
      <span class="stat-num mono" id="stat-high" style="color: var(--high)"
        >—</span
      >
      <span class="stat-note">active support needed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Critical</span>
      <span class="stat-num mono" id="stat-crit" style="color: var(--crit)"
        >—</span
      >
      <span class="stat-note">urgent outreach required</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Avg engagement</span>
      <span class="stat-num mono" id="stat-engagement">—</span>
      <span class="stat-note">of module duration active</span>
    </div>
  </div>
</div>
