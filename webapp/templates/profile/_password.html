<div class="card prof-card" id="card-password">
	<div class="card-head">
	  <h3><i class="fas fa-lock"></i> Change password</h3>
	</div>
	<form method="POST" action="{{ url_for('profile.change_password') }}" class="prof-form" id="form-password" autocomplete="off">
	  <div class="prof-form-group">
		<label class="prof-label" for="current_password">Current password</label>
		<div class="prof-input-wrap">
		  <input
			type="password"
			id="current_password"
			name="current_password"
			class="prof-input"
			placeholder="Enter current password"
			required
			autocomplete="current-password"
		  />
		  <button type="button" class="prof-eye" onclick="Profile.toggleEye(this)" tabindex="-1">
			<i class="fas fa-eye"></i>
		  </button>
		</div>
	  </div>
	  <div class="prof-form-group">
		<label class="prof-label" for="new_password">New password</label>
		<div class="prof-input-wrap">
		  <input
			type="password"
			id="new_password"
			name="new_password"
			class="prof-input"
			placeholder="At least 8 characters"
			required
			autocomplete="new-password"
			oninput="Profile.checkStrength(this.value)"
		  />
		  <button type="button" class="prof-eye" onclick="Profile.toggleEye(this)" tabindex="-1">
			<i class="fas fa-eye"></i>
		  </button>
		</div>
		<div class="prof-strength" id="pw-strength" style="display:none;">
		  <div class="prof-strength-bar">
			<div class="prof-strength-fill" id="pw-strength-fill"></div>
		  </div>
		  <span class="prof-strength-label" id="pw-strength-label"></span>
		</div>
	  </div>
	  <div class="prof-form-group">
		<label class="prof-label" for="confirm_password">Confirm new password</label>
		<div class="prof-input-wrap">
		  <input
			type="password"
			id="confirm_password"
			name="confirm_password"
			class="prof-input"
			placeholder="Repeat new password"
			required
			autocomplete="new-password"
			oninput="Profile.checkMatch()"
		  />
		  <button type="button" class="prof-eye" onclick="Profile.toggleEye(this)" tabindex="-1">
			<i class="fas fa-eye"></i>
		  </button>
		</div>
		<span class="prof-match-msg" id="pw-match-msg"></span>
	  </div>
	  <div class="prof-form-footer">
		<button type="submit" class="btn btn-primary btn-sm" id="btn-change-pw" disabled>
		  <i class="fas fa-lock"></i> Change password
		</button>
	  </div>
	</form>
  </div>
