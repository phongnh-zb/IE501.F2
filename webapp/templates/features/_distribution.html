<div class="card feat-section">
  <div class="card-head">
    <div class="feat-dist-head">
      <h3><i class="fas fa-chart-bar"></i> Feature distribution</h3>
      <select class="st-select feat-sel" id="feat-select">
        {% for group, feats in feature_groups.items() %}
        <optgroup label="{{ group }}">
          {% for f in feats %}
          <option value="{{ f.field }}" {% if f.field == default_field %}selected{% endif %}>
            {{ f.label }}
          </option>
          {% endfor %}
        </optgroup>
        {% endfor %}
      </select>
    </div>
    <span class="text-xs text-3">By risk tier · p1–p99</span>
  </div>
  <div class="card-body">
    <div class="chart-wrap" style="height:300px;">
      <div id="chart-dist-loading" class="chart-loading">
        <i class="fas fa-spinner fa-spin"></i> Loading…
      </div>
      <div id="chart-dist" style="height:100%;"></div>
    </div>
  </div>
</div>
